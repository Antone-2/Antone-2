
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-compatible" content="IE=edge">
<meta name="viewpoint"content="width=device-width,initial-scale=1.0">
<title> Login & Registration | Antone</title>
<link rel="stylesheet"href="style.css">
</head>
<body>
<header>
    <h2 class="logo">Logo</h2>
    <nav class="navigation">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
        

    </nav>
</header>
<style>@import url('https://fonts.googleapis.com/css??family=Poppins');
    * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
    
    }
  
    body {
        display: flex;
        background-image: url('https://th.bing.com/th/id/R.dabb052406b98ad53abf976db0679e31?rik=Es5Oobx0kFRC%2bg&riu=http%3a%2f%2f4.bp.blogspot.com%2f-cQ4XnoW4Ysc%2fTzbg3Jh25VI%2fAAAAAAAAA74%2fxFjSDny2SqU%2fs1600%2f21.Jpg&ehk=Q88y%2b7a98mHBLzs3%2fXLC4iuSw8LOmnic8Q%2bqgUPUcpg%3d&risl=&pid=ImgRaw&r=0');
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-size: cover;
        background-position: center;
    }
    
    header {
        position:fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px 100px;
          background: rgb(38, 38, 197);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 99;
    
    }
    .logo {
        font-size: 1.5em;
        color: #fff;
        user-select: none;
        
    }
    .navigation {
        display: flex;
        gap: 15px;
    }
    .navigation a {
        position: relative;
        font-size: 1.1em;
        color: #fff;
        text-decoration: none;
        padding: -10px 15px;
        font-weight: 500;
        margin-left: 40px;
        transition: background-color .3s;
       
    
    }
    .navigation a ::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: -6px;
        width: 100%;
        height: 3px;
        background: #fff;
        border-radius: 5px;
        transform-origin:right;
        transform: scaleX(0);
        transition: transform .5s;
    }
    .navigation a:hover {
        background-color: rgba(255, 255, 255, .2);
        border-radius: 5px;
    }
    .navigation a:hover ::after {
        transform-origin:left;
    transform: scaleX(1);
    }
   
    .wrapper {
        position:relative;
        width: 400px;
        height: auto;
        background:transparent;
        border: 2px solid rgb(255, 255, 255, .5);
        border-radius: 20px;
        backdrop-filter: blur(50px);
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        display:flex;
        justify-content:center;
        align-items:center;
        overflow: hidden;
        transform: scale(1);
        margin: 50px auto;
        transition: transform  .5s ease,  height .2s ease;
    }
    .wrapper.active-popup {
        transform: scale(1);
    } 
    .form-container{
        display: flex;
        width: 100%;
    }
    .wrapper .form-box {
        width: 100%;
        padding:40px;
    }
    .wrapper.active {
        height: 520px;
    }
    .wrapper .form-box .login {
        display: none;
        transition: transform .18s ease;
        transform: translateX(0);
    }
    .wrapper.active .form-box .login {
        transition: none;
        transform: translateX(-400px);
    }
    .wrapper .form-box.register {
        position: absolute;
        transition: none;
        transform: translateX(400px);
    }
    .wrapper.active .form-box .register {
        display: none;
        transition: transform .18s ease;
        transform: translateX(0);
    }
    
    .wrapper .form-box .login {
        display: none;
        transition: transform .18s ease;
        transform: translateX(0);
    }
    .wrapper .icon-close {
        position: absolute;
        top: 0;
        right: 0;
        width: 45px;
        height: 45px;
        background: #162938;
        font-size: 2em;
        color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        border-bottom-left-radius: 20px;
        cursor: pointer;
        z-index: 1;
    }
    .wrapper .icon-close::before {
        content: '\00d7';
    }
    .form-box h2{
        font-size: 2em;
        color:#162938;
        text-align: center;
    }
    .input-box {
        position: relative;
        width:100%;
        height: 50px;
        border-bottom: 2px solid#162938;
        margin:30px 0;
    
    }
    .input-box label{
        position: absolute;
        top: 50%;
        left: 5px;
        transform:translateY(-50%);
        font-size: 1em;
        color:#162938;
        font-weight:500;
        pointer-events: none;
        transition: .5s;
    }
    .input-box input:focus~label,
    .input-box input:valid~label {
        top: -5px;
    }
    .input-box input{
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        outline: none;
        font-size: 1em;
        color:#162938;
        font-weight: 600;
        padding:  0 5px;
    }
    .input-box .icon {
        position:absolute;
        right: 8px;
        font-size: 1.2em;
        color: #162938;
        line-height: 57px;
    }
    .remember-forgot {
        font-size: .9em;
        color: #162938;
        font-weight: 500;
        margin: -15px 0 15px;
    display: flex;
    justify-content: space-between;
    }
    .remember-forgot label input {
        accent-color: #162938;
        margin-right: 3px;
    }
    .remember-forgot a {
        color: #162938;
        text-decoration: none;
    
    }
    .remember-forgot a:hover {
        text-decoration: underline;
    }
    .btn {
        width:100%;
        height: 50px;
        background: #162938;
        border: none;
        outline: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1em;
        color: #fff;
        font-weight: 500;
        transition: .5s;
    }
    .btn:hover {
        background: #0d1b2a;
    }
    .login-register {
        font-size: .9em;
        color: #162938;
        text-align: center;
        font-weight: 500;
        margin: 25px 0 10px;
    }
    .login-register p a {
        color: #162938;
        text-decoration: none;
        font-weight: 600;
    
    }
    .login-register p a:hover {
        text-decoration: underline;
    }</style>
<script src="script.js"></script>
<div class="wrapper">
    <span class="icon-close"></span>
    <ion-icon name="close"></ion-icon>
    <div class="form-box login">
    <h2>Login</h2>
    <form action="#">
        <div class="input-box">
            <span class="icon"><ion-icon name="mail-outline"></ion-icon></span>
            <input type="email"required>
            <label>Email</label>
        </div>
        <div class="input-box">
            <span class="icon"><ion-icon name="lock-closed-outline"></ion-icon></span>
            <input type="password"required>
            <label>Password</label>
        </div>
        <div class="remember-forgot">

            <label><input type="checkbox">Remember me</label>
            <a href="#">Forgot Password?</a>
        </div>
        <button type="submit" class="btn">Login</button>
        <div class="login.register"><br>
            <p>Don't have an account?<a href="peter.html" class="register-link">Register</a></p>
        </div>
    </form>
</div>

    </form>
</div>
</main>
<script scr="script.js"></script>
<script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>

</body>
</html>
