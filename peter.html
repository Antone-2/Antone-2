<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-compatible" content="IE=edge">
    <meta name="viewpoint" content="width=device-width,initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="style.css">
</head>
<header>
    <h2 class="logo">Logo</h2>
    <nav class="navigation">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>


    </nav>
</header>
<style>
    @import url('https://fonts.googleapis.com/css??family=Poppins');

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;

    }

    body {
        display: flex;
        background-image: url('https://th.bing.com/th/id/R.dabb052406b98ad53abf976db0679e31?rik=Es5Oobx0kFRC%2bg&riu=http%3a%2f%2f4.bp.blogspot.com%2f-cQ4XnoW4Ysc%2fTzbg3Jh25VI%2fAAAAAAAAA74%2fxFjSDny2SqU%2fs1600%2f21.Jpg&ehk=Q88y%2b7a98mHBLzs3%2fXLC4iuSw8LOmnic8Q%2bqgUPUcpg%3d&risl=&pid=ImgRaw&r=0');
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background-size: cover;
        background-position: center;
    }

    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        padding: 20px 100px;
        background: rgb(29, 29, 202);
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 99;

    }

    .logo {
        font-size: 1.5em;
        color: #fff;
        user-select: none;

    }
    .navigation {
        display: flex;
        gap: 15px;
    }
    .navigation a {
        position: relative;
        font-size: 1.1em;
        color: #fff;
        text-decoration: none;
        padding: -10px 15px;
        font-weight: 500;
        margin-left: 40px;
        transition: background-color .3s;
    
    }
    .navigation a:hover{
        background-color: rgba(255,255, 255, .2);
        border-radius: 5px;
    }
    .navigation a ::after {
        content: '';
        position: absolute;
        left: 0;
        bottom: -6px;
        width: 100%;
        height: 3px;
        background: #fff;
        border-radius: 5px;
        transform: scaleX(0);
        transform-origin: right;
        transition: transform .5s;
    }
    .navigation a:hover::after {
        transform: scaleX(1);
        transform-origin: left;
    }

    .wrapper {
        position: relative;
        width: 400px;
        height: auto;
        background: transparent;
        border: 2px solid rgb(255, 255, 255, .5);
        border-radius: 20px;
        backdrop-filter: blur(50px);
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);

        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        transform: scale(1);
        margin: 50px auto;
        transition: transform .5s ease, height .2s ease;
    }

    .wrapper.active-popup {
        transform: scale(1);
    }

    .form-container {
        display: flex;
        width: 100%;
    }

    .wrapper .form-box {
        width: 100%;
        padding: 40px;
    }

    .wrapper.active {
        height: 520px;
    }
.wrapper.form-box .register {
    position: absolute;
   transition: none;
   transform: translateX(400px);
}
.wrapper.active .form-box .register{
    display: none;
    transition: transform .18s ease;
    transform: translateX(0);
}
   .wrapper .icon-close {
         position: absolute;
         top: 0;
    right: 0;
    width: 45px;
    height: 45px;
    background: #162938;
    font-size: 2em;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    border-bottom-left-radius: 20px;
    cursor: pointer;
    z-index: 1;
}
.wrapper .icon-close::before {
    content: '\00d7';
}
.form-box h2 {
    color: #162938;
    font-size: 2em;
    text-align: center;
}
.input-box {
    position: relative;
    width: 100%;
    height: 50px;
    border-bottom: 2px solid #162938;
    margin: 15px 0;
}
.input-box label {
    position: absolute;
    top: 50%;
    left: 5px;
    transform: translateY(-50%);
    font-weight: 500;
    color: #162938;
    font-size: 1em;
    pointer-events: none;
    transition: .5s;
}
    
 .input-box input:focus~label,
    .input-box input:valid~label {
        top: -5px;
    }
.input-box input {
    width: 100%;
    height: 100%;
    border: none;
    outline: none;
    background: transparent;
    padding: 0 5px;
    font-size: 1em;
    color: #162938;
    font-weight: 600;
    }
    .input-box .icon{
    position: absolute;
    right: 8px;
    font-size: 1.2em;
    color: #162938;
    line-height: 57px;
    }
    .remember-password {
    font-size: .9em;
    color: #162938;
    font-weight: 500;
    display: flex;
    justify-content: space-between;
    margin: -15px 0 15px;
    }
.btn {
    width: 100%;
    height: 50px;
    padding: 15px;
    border: none;
    outline: none;
    background: #162938;
    color: #fff;
    font-size: 1.2em;
    font-weight: 600;
    cursor: pointer;
    border-radius: 5px;
    transition: .5s;
}
.btn:hover {
    background: #162938;
    transform: scale(1.05);
}
.register-login {
    font-size: .9em;
    color: #162938;
    font-weight: 500;
    text-align: center;
    margin: 25px 0;
    right: 0;
}
.register-login p a {
    color: #162938;
    text-decoration: none;
    font-weight: 600;
}
.register-login p a:hover {
    text-decoration: underline;
}
  
   
</style>
<body>
    <div class="wrapper">
        <span class="icon-close"></span>
        <ion-icon name="close" ></ion-icon>
<div class="form-box register">
            <h2>Register</h2>
            <form action="#">
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="person"></ion-icon>
                    </span>
                    <input type="text" required>
                    <label>Full Name</label>
                </div>
                <div class="input-box"> 
                    <span class="icon">
                        <ion-icon name="mail"></ion-icon>
                    </span>
                    <input type="email" required>
                    <label>Email</label>
                </div>
                <div class="input-box">
                    <span class="icon">
                        <ion-icon name="lock-closed"></ion-icon>
                    </span>
                    <input type="password" required>
                    <label>Password</label>
                </div>
                <div class="input-box"> 
                    <span class="icon">
                        <ion-icon name="lock-closed"></ion-icon>
                    </span>
                    <input type="password" required>
                    <label>Confirm Password</label>
                    <i class='bx bxs-lock-alt'></i>
                </div>
                <div class="remember-password">
                    <input type="checkbox" id="agree">
                    <label for="agree">I agree to the terms and conditions</label><br><br>
                <button type="submit" class="btn">Register</button>
                <div class="login-register"><br>
                    <p>Already have an account?<a href="node.html" class="login-link">Login</a></p>
                </div>
            </form>
        </div>
    </div>
    <script src="script.js"></script>
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</body>

</html>
